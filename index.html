<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Failsafe - Early Warning System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen">

    <div class="container mx-auto px-4 py-8">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-indigo-500 tracking-tight">FAILSAFE</h1>
            <p class="text-gray-400 mt-2">Early Warning System for At-Risk Students</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700">
                <h2 class="text-xl font-semibold mb-4 text-indigo-400">Enter Student Academic Details</h2>
                <form id="predictForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-400">Gender (sex)</label>
                        <select id="sex" class="w-full mt-1 p-2 bg-gray-700 border border-gray-600 rounded text-white" required>
                            <option value="M">Male (M)</option>
                            <option value="F">Female (F)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400">Weekly Study Time (1: &lt;2hrs, 2: 2-5hrs, 3: 5-10hrs, 4: &gt;10hrs)</label>
                        <input type="number" id="studytime" min="1" max="4" value="2" class="w-full mt-1 p-2 bg-gray-700 border border-gray-600 rounded text-white" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400">Past Class Failures (0 to 3)</label>
                        <input type="number" id="failures" min="0" max="3" value="0" class="w-full mt-1 p-2 bg-gray-700 border border-gray-600 rounded text-white" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400">Number of Absences (0 to 93)</label>
                        <input type="number" id="absences" min="0" max="93" value="4" class="w-full mt-1 p-2 bg-gray-700 border border-gray-600 rounded text-white" required>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-400">Term 1 Marks - G1 (0-20)</label>
                            <input type="number" id="G1" min="0" max="20" value="12" class="w-full mt-1 p-2 bg-gray-700 border border-gray-600 rounded text-white" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-400">Term 2 Marks - G2 (0-20)</label>
                            <input type="number" id="G2" min="0" max="20" value="11" class="w-full mt-1 p-2 bg-gray-700 border border-gray-600 rounded text-white" required>
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded transition duration-200 shadow-md">
                        Analyze Student Risk
                    </button>
                </form>
            </div>

            <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700 flex flex-col justify-between">
                <div>
                    <h2 class="text-xl font-semibold mb-4 text-indigo-400">AI Prediction Dashboard</h2>
                    <div id="welcomeMessage" class="text-gray-500 text-center py-20">
                        Fill the form and click "Analyze" to see Explainable AI Results.
                    </div>
                    
                    <div id="resultContent" class="hidden space-y-6">
                        <div class="flex items-center justify-between p-4 bg-gray-700 rounded-lg">
                            <div>
                                <p class="text-sm text-gray-400">Risk Percentage</p>
                                <p id="riskPercent" class="text-3xl font-black text-white">0%</p>
                            </div>
                            <span id="riskBadge" class="px-4 py-2 rounded-full text-sm font-bold shadow">SAFE</span>
                        </div>

                        <div>
                            <h3 class="text-md font-bold text-yellow-500 mb-2">💡 Personalised Intervention Plan:</h3>
                            <ul id="interventionList" class="list-disc pl-5 space-y-1 text-gray-300 text-sm"></ul>
                        </div>

                        <div>
                            <h3 class="text-md font-bold text-teal-400 mb-2">🔍 Explainable AI (SHAP Feature Impact):</h3>
                            <div id="shapContainer" class="space-y-2 bg-gray-900 p-3 rounded border border-gray-700"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('predictForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Get data from Form
            const studentData = {
                sex: document.getElementById('sex').value,
                studytime: parseInt(document.getElementById('studytime').value),
                failures: parseInt(document.getElementById('failures').value),
                absences: parseInt(document.getElementById('absences').value),
                G1: parseInt(document.getElementById('G1').value),
                G2: parseInt(document.getElementById('G2').value)
            };

            try {
                // Call FastAPI Server
                const response = await fetch('http://127.0.0.1:8000/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(studentData)
                });

                const result = await response.json();

                if(result.status === "success") {
                    // Show Dashboard UI
                    document.getElementById('welcomeMessage').classList.add('hidden');
                    document.getElementById('resultContent').classList.remove('hidden');

                    // Update Risk Percentage and Badge
                    document.getElementById('riskPercent').innerText = result.risk_percentage + "%";
                    const badge = document.getElementById('riskBadge');
                    if(result.at_risk_prediction === 1) {
                        badge.innerText = "AT RISK";
                        badge.className = "px-4 py-2 rounded-full text-sm font-bold shadow bg-red-600 text-white animate-pulse";
                    } else {
                        badge.innerText = "SAFE";
                        badge.className = "px-4 py-2 rounded-full text-sm font-bold shadow bg-green-600 text-white";
                    }

                    // Update Intervention Plan
                    const listContainer = document.getElementById('interventionList');
                    listContainer.innerHTML = "";
                    result.automated_intervention_plan.forEach(plan => {
                        let li = document.createElement('li');
                        li.innerText = plan;
                        listContainer.appendChild(li);
                    });

                    // Render SHAP Feature Impact Bars
                  const shapContainer = document.getElementById('shapContainer');
shapContainer.innerHTML = "";
for (const [feature, value] of Object.entries(result.explainable_ai_shap)) {
    const isPositive = value >= 0;
    
    // ⚠️ वैल्यूज़ को 0 से 2 के स्केल पर नॉर्मलाइज़ कर रहे हैं ताकि बार स्क्रीन से बाहर न जाए
    const maxShapScale = 2.0; 
    const widthPercent = Math.min((Math.abs(value) / maxShapScale) * 100, 100); 
    
    let barHtml = `
        <div class="text-xs mb-1 font-mono">${feature}: <span class="${isPositive ? 'text-red-400' : 'text-green-400'}">${value.toFixed(4)}</span></div>
        <div class="w-full bg-gray-700 h-2 rounded mb-2 overflow-hidden">
            <div class="h-full rounded ${isPositive ? 'bg-red-500' : 'bg-green-500'}" style="width: ${widthPercent}%"></div>
        </div>
    `;
    shapContainer.innerHTML += barHtml;
}
                }
            } catch (error) {
                alert("Error connecting to FastAPI backend. Make sure Uvicorn is running!");
                console.error(error);
            }
        });
    </script>
</body>
</html>
